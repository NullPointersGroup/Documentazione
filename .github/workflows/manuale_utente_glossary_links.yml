name: Aggiorna Link Glossario Manuale Utente

on:
  push:
    branches:
      - 'feature/*'
    paths:
      - 'src/PB/Documenti Esterni/Manuale Utente/**/*.tex'
      - '.github/workflows/manuale_utente_glossary_links.py'
      - '.github/workflows/manuale_utente_glossary_links.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manuale-utente-glossary-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Aggiorna link interni al glossario del Manuale Utente
        run: python .github/workflows/manuale_utente_glossary_links.py

      - name: Commit e push modifiche
        run: |
          git config --global user.name "GitHub App"
          git config --global user.email "noreply@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add "src/PB/Documenti Esterni/Manuale Utente"
          git add ".github/workflows/manuale_utente_glossary_links.py"
          git add ".github/workflows/manuale_utente_glossary_links.yml"
          git commit -m "Auto: aggiorna link glossario Manuale Utente" || exit 0
          git push origin "$GITHUB_REF_NAME"
